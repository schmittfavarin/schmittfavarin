<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schmitt Favarin | Odontologia e Harmonização</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FAFAF8;
      --dourado: #8B6E3A;
      --dourado-claro: #C4A97A;
      --texto: #2C2416;
      --texto-suave: #5A4A32;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 24px 64px;
    }

    .logo-wrap {
      width: 274px;
      margin-bottom: 4px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    .logo-wrap img {
      width: 100%;
      display: block;
    }

    .frase {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-style: italic;
      font-weight: 300;
      color: var(--texto-suave);
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.25s;
    }

    .tagline {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dourado);
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.35s;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--dourado);
      opacity: 0.3;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .links {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(168,137,90,0.15);
      border-radius: 2px;
      text-decoration: none;
      color: var(--texto);
      transition: all 0.3s ease;
      opacity: 0;
      backdrop-filter: blur(4px);
    }

    .link-btn:nth-child(1) { animation: fadeUp 0.7s ease forwards 0.5s; }
    .link-btn:nth-child(2) { animation: fadeUp 0.7s ease forwards 0.65s; }
    .link-btn:nth-child(3) { animation: fadeUp 0.7s ease forwards 0.8s; }

    .link-btn:hover {
      background: rgba(255,255,255,0.95);
      border-color: rgba(168,137,90,0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(168,137,90,0.1);
    }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--dourado);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .link-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .link-label {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dourado);
    }

    .link-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--texto);
      letter-spacing: 0.3px;
    }

    .link-arrow {
      margin-left: auto;
      color: var(--dourado-claro);
      opacity: 0.6;
      font-size: 20px;
    }

    .footer {
      margin-top: 48px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dourado);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
